<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizzy — Questions</title>
  <link rel="stylesheet" href="/styles/main.css">
  <style>
    .page { max-width: 900px; margin: 0 auto; padding: 28px 20px; }
    .questions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .score-pill { background: var(--cyan-dim); border: 1px solid rgba(6,182,212,0.25); border-radius: var(--radius-sm); padding: 6px 16px; font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--cyan); }
    .page-header { margin-bottom: 28px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .header-left h2 { font-size: 24px; font-weight: 800; }
    .header-left p { color: var(--text-2); font-size: 13.5px; margin-top: 4px; }
    .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .refresh-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-2); cursor: pointer; padding: 6px 10px; transition: var(--t); font-size: 14px; }
    .refresh-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .q-link { text-decoration: none; display: block; color: inherit; }
    .q-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-unattempted { background: var(--text-3); }
    .dot-correct { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot-wrong { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .q-arrow { color: var(--text-3); font-size: 18px; transition: var(--t); }
    .q-card:hover .q-arrow { color: var(--cyan); transform: translateX(3px); }
    .scoreboard-row { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .score-stat { background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 20px; min-width: 100px; }
    .score-stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); margin-bottom: 4px; }
    .score-stat-value { font-size: 24px; font-weight: 800; font-family: var(--mono); }
    .score-stat-value.cyan { color: var(--cyan); }
    .score-stat-value.green { color: var(--green); }
  </style>
</head>
<body>
  <header class="app-header">
    <span class="header-logo">Quizzy</span>
    <div class="header-info">
      <span id="teamLabel" class="text-sm text-muted"></span>
      <div class="countdown" id="countdown">--:--:--</div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <div class="page">
    <div class="scoreboard-row" id="scoreboardRow" style="display:none">
      <div class="score-stat">
        <div class="score-stat-label">Your Score</div>
        <div class="score-stat-value cyan" id="statScore">0</div>
      </div>
      <div class="score-stat">
        <div class="score-stat-label">Correct</div>
        <div class="score-stat-value green" id="statCorrect">0</div>
      </div>
      <div class="score-stat">
        <div class="score-stat-label">Attempted</div>
        <div class="score-stat-value" id="statAttempted">0</div>
      </div>
      <div class="score-stat">
        <div class="score-stat-label">Total Qs</div>
        <div class="score-stat-value" id="statTotal">0</div>
      </div>
    </div>

    <div class="page-header">
      <div class="header-left">
        <h2>Questions</h2>
        <p id="pageSubtitle">Loading...</p>
      </div>
      <div class="header-right">
        <button class="refresh-btn" onclick="loadQuestions()" title="Refresh">&#8635;</button>
      </div>
    </div>

    <div id="questionsGrid" class="questions-grid">
      <div class="empty-state" style="grid-column:1/-1">
        <div class="spinner" style="width:28px;height:28px;margin:0 auto 12px"></div>
        <p>Loading questions...</p>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    var contestEndTime = null;
    var countdownInterval = null;

    async function init() {
      try {
        var me = await fetch('/api/me').then(function(r) { return r.json(); });
        if (me.type !== 'team') { location.href = '/'; return; }
        document.getElementById('teamLabel').textContent = me.teamName;
      } catch(e) { location.href = '/'; return; }

      try {
        var cfg = await fetch('/api/config').then(function(r) { return r.json(); });
        contestEndTime = cfg.contestEndTime ? new Date(cfg.contestEndTime) : null;
      } catch(e) {}

      loadQuestions();
      updateCountdown();
      countdownInterval = setInterval(updateCountdown, 1000);
      setInterval(loadQuestions, 15000);
    }

    async function loadQuestions() {
      try {
        var questions = await fetch('/api/questions').then(function(r) { return r.json(); });
        renderQuestions(questions);
      } catch(e) {
        showToast('Failed to load questions', 'error');
      }
    }

    function renderQuestions(questions) {
      var grid = document.getElementById('questionsGrid');

      if (!questions.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">&#128274;</div><h3>No questions yet</h3><p>Questions will appear here when released by the admin.</p></div>';
        document.getElementById('pageSubtitle').textContent = 'Waiting for questions...';
        document.getElementById('scoreboardRow').style.display = 'none';
        return;
      }

      var answered = questions.filter(function(q) { return q.answered; }).length;
      var correct = questions.filter(function(q) { return q.isCorrect; }).length;
      var pointsPerQ = 10;

      document.getElementById('pageSubtitle').textContent = answered + ' of ' + questions.length + ' answered \u00b7 ' + correct + ' correct';
      document.getElementById('scoreboardRow').style.display = 'flex';
      document.getElementById('statScore').textContent = (correct * pointsPerQ) + ' pts';
      document.getElementById('statCorrect').textContent = correct;
      document.getElementById('statAttempted').textContent = answered;
      document.getElementById('statTotal').textContent = questions.length;

      grid.innerHTML = questions.map(function(q, i) {
        var statusClass = '', dotClass = 'dot-unattempted', statusLabel = 'Not attempted';
        if (q.answered && q.isCorrect) { statusClass = 'answered-correct'; dotClass = 'dot-correct'; statusLabel = 'Correct'; }
        else if (q.answered && !q.isCorrect) { statusClass = 'answered-wrong'; dotClass = 'dot-wrong'; statusLabel = 'Incorrect'; }
        var multiTag = q.isMultiAnswer ? '<span class="badge badge-purple">Multi-select</span>' : '';
        return '<a href="/contestant/question?id=' + q.id + '" class="q-link">' +
          '<div class="q-card ' + statusClass + '">' +
            '<div class="q-card-num">Question ' + (i + 1) + '</div>' +
            '<div class="q-card-title">' + escHtml(truncate(stripMd(q.title), 90)) + '</div>' +
            '<div class="q-card-footer">' +
              '<div class="flex items-center gap-2">' +
                '<div class="q-status-dot ' + dotClass + '"></div>' +
                '<span class="text-sm text-muted">' + statusLabel + '</span>' +
                multiTag +
              '</div>' +
              '<span class="q-arrow">&#8250;</span>' +
            '</div>' +
          '</div>' +
        '</a>';
      }).join('');
    }

    function updateCountdown() {
      var el = document.getElementById('countdown');
      if (!contestEndTime) { el.textContent = '--:--:--'; return; }
      var now = new Date();
      var diff = contestEndTime - now;
      if (diff <= 0) {
        el.textContent = 'ENDED';
        el.classList.add('expired');
        if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
        return;
      }
      var h = Math.floor(diff / 3600000);
      var m = Math.floor((diff % 3600000) / 60000);
      var s = Math.floor((diff % 60000) / 1000);
      el.textContent = pad(h) + ':' + pad(m) + ':' + pad(s);
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      location.href = '/';
    }

    function showToast(msg, type) {
      type = type || 'info';
      var c = document.getElementById('toast-container');
      var t = document.createElement('div');
      t.className = 'toast toast-' + type;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(function() {
        t.style.animation = 'toastOut 0.3s ease forwards';
        setTimeout(function() { t.remove(); }, 300);
      }, 3000);
    }

    function pad(n) { return String(n).padStart(2, '0'); }
    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function truncate(s, n) { return s.length > n ? s.slice(0, n) + '\u2026' : s; }
    function stripMd(s) { return s.replace(/[#*`_~\[\]()]/g, '').trim(); }

    init();
  </script>
</body>
</html>
